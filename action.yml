name: 'PR Reviewer'
description: 'AI-powered senior developer PR review with auto-fix capabilities'
inputs:
  review_config:
    description: 'Path to the review configuration file'
    required: true
    default: '.github/review-config.yml'
  provider:
    description: 'LLM provider to use (openai, anthropic, gemini). Use openai for any OpenAI-compatible API (Together, Groq, Ollama, vLLM, etc.) with base_url.'
    required: false
    default: 'openai'
  api_key:
    description: 'API key for the configured LLM provider'
    required: true
  base_url:
    description: 'Custom API base URL for OpenAI-compatible providers (e.g. http://localhost:11434/v1 for Ollama, https://api.together.xyz/v1 for Together)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token with repo permissions'
    required: true
  database_url:
    description: 'Read-only database URL (optional)'
    required: false
    default: ''
  auto_fix:
    description: 'Enable auto-fix for trivial issues'
    required: false
    default: 'true'
  auto_merge:
    description: 'Merge the PR after a passing review (only when auto-merge is enabled on the PR)'
    required: false
    default: 'true'
  model:
    description: 'Model name to use for reviews (provider-specific, e.g. gpt-4o, claude-sonnet-4-20250514, gemini-2.0-flash)'
    required: false
    default: 'gpt-4o'
runs:
  using: 'node20'
  main: 'dist/index.mjs'
